<!DOCTYPE html>
<html>
<body>

<script>
let num = prompt("Enter a number:");
let original = num;
let reverse = "";

for(let i = num.length - 1; i >= 0; i--) {
    reverse += num[i];
}

if(original == reverse)
    document.write(original + " is a Palindrome");
else
    document.write(original + " is Not a Palindrome");
</script>

</body>
</html>

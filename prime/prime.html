<!DOCTYPE html>
<html>
<head>
    <title>Prime Number Check</title>
</head>
<body>

<h2>Prime Number Checker</h2>

<script>
    let num = parseInt(prompt("Enter a number:"));
    let prime = true;

    if (num <= 1) {
        prime = false;
    } else {
        for (let i = 2; i < num; i++) {
            if (num % i === 0) {
                prime = false;
                break;
            }
        }
    }

    if (prime) {
        document.write(num + " is a Prime Number");
    } else {
        document.write(num + " is Not a Prime Number");
    }
</script>

</body>
</html>

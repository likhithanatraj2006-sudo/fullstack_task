<!DOCTYPE html>
<html>
<head>
    <title>LIKI'S Bakery Billing System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-image: url('images/bakery.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container{
            width: 650px;
            margin: 30px auto;
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px black;
        }

        h1{
            text-align: center;
            color: brown;
        }

        h3{
            color: darkred;
        }

        label{
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: brown;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background: darkred;
        }

        #output{
            margin-top: 20px;
            background: #fff8dc;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🍰 LIKI'S Bakery Billing System 🍪</h1>

    <h3>Customer Details</h3>

    <label>Customer Name</label>
    <input type="text" id="name">

    <label>Mobile Number</label>
    <input type="text" id="mobile">

    <label>Address</label>
    <input type="text" id="address">

    <label>Order Date</label>
    <input type="date" id="date">

    <h3>Product Details</h3>

    <label>Cake Quantity (₹500 each)</label>
    <input type="number" id="cake" value="0">

    <label>Bread Quantity (₹40 each)</label>
    <input type="number" id="bread" value="0">

    <label>Cookies Quantity (₹20 each)</label>
    <input type="number" id="cookie" value="0">

    <button onclick="calculateBill()">Generate Bill</button>

    <div id="output"></div>

</div>

<script>

function calculateBill()
{
    var name = document.getElementById("name").value;
    var mobile = document.getElementById("mobile").value;
    var address = document.getElementById("address").value;
    var date = document.getElementById("date").value;

    var cake = Number(document.getElementById("cake").value);
    var bread = Number(document.getElementById("bread").value);
    var cookie = Number(document.getElementById("cookie").value);

    var total = (cake * 500) +
                (bread * 40) +
                (cookie * 20);

    var gst = total * 0.05;
    var discount = total * 0.10;
    var finalBill = total + gst - discount;
    var profit = total * 0.30;

    var billNo = Math.floor(Math.random() * 10000);

    document.getElementById("output").innerHTML =

    "<h2>🧾 BILL RECEIPT</h2>" +

    "<b>Bill No:</b> " + billNo + "<br>" +
    "<b>Customer Name:</b> " + name + "<br>" +
    "<b>Mobile:</b> " + mobile + "<br>" +
    "<b>Address:</b> " + address + "<br>" +
    "<b>Order Date:</b> " + date + "<hr>" +

    "<b>Cake Amount:</b> ₹" + (cake * 500) + "<br>" +
    "<b>Bread Amount:</b> ₹" + (bread * 40) + "<br>" +
    "<b>Cookies Amount:</b> ₹" + (cookie * 20) + "<br><hr>" +

    "<b>Total Amount:</b> ₹" + total + "<br>" +
    "<b>GST (5%):</b> ₹" + gst.toFixed(2) + "<br>" +
    "<b>Discount (10%):</b> ₹" + discount.toFixed(2) + "<br>" +
    "<b>Final Bill:</b> ₹" + finalBill.toFixed(2) + "<br>" +
    "<b>Profit (30%):</b> ₹" + profit.toFixed(2) + "<hr>" +

    "<h3 style='color:green;'>🎉 Thank You For Visiting Liki's Bakery!</h3>" +
    "<p>Dear <b>" + name + "</b>, your order has been placed successfully.</p>" +
    "<p>We hope you enjoy our cakes, cookies and sweets.</p>" +
    "<p><b>Visit Again! 😊</b></p>";
}

</script>

</body>
</html>

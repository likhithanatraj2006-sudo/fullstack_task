
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Hamburger Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    button {
      background: #333;
      color: #fff;
      border: none;
      padding: 10px 15px;
      font-size: 18px;
      cursor: pointer;
    }
    #menu {
      background: #f4f4f4;
      padding: 10px;
    }
    #menu a {
      display: block;
      padding: 8px;
      text-decoration: none;
      color: #333;
    }
    #menu a:hover {
      background: #ddd;
    }
  </style>
</head>
<body>
  <button onclick="toggleMenu()">☰ Menu</button>

  <div id="menu" style="display:none;">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <script>
    function toggleMenu() {
      let menu = document.getElementById("menu");
      menu.style.display =
        menu.style.display === "none" ? "block" : "none";
    }
  </script>


</body>
</html>
